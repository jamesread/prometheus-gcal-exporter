name: Docker Image CI

# Called by semantic-release after a new version tag is created.
# Also runs on manually pushed tags (e.g. from a human / PAT).
on:
  push:
    tags:
      - '*'
  workflow_call:
    inputs:
      tag:
        description: Image / git tag to build and push
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag:
        description: Image / git tag to build and push
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref_name }}

      - uses: docker/login-action@v3
        with:
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          registry: ghcr.io

      - name: Set image tag
        id: meta
        run: echo "tag=${{ inputs.tag || github.ref_name }}" >> "$GITHUB_OUTPUT"

      - name: Build the Docker image
        run: docker build . --file Dockerfile --tag "ghcr.io/jamesread/prometheus-gcal-exporter:${{ steps.meta.outputs.tag }}"

      - name: Push the docker image
        run: docker push "ghcr.io/jamesread/prometheus-gcal-exporter:${{ steps.meta.outputs.tag }}"

      - name: Tag the docker image
        run: docker tag "ghcr.io/jamesread/prometheus-gcal-exporter:${{ steps.meta.outputs.tag }}" ghcr.io/jamesread/prometheus-gcal-exporter:latest

      - name: Push the latest docker image
        run: docker push ghcr.io/jamesread/prometheus-gcal-exporter:latest
